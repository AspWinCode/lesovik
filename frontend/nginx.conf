server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Bare root → App Builder (use $http_host to preserve non-standard port like :8090)
    location = / {
        return 302 $scheme://$http_host/editor/;
    }

    # Editor bundle (App Builder) — built with base /editor/
    location /editor/ {
        alias /usr/share/nginx/html/editor/;
        try_files $uri $uri/ /editor/index.html;
    }
    location = /editor/index.html {
        alias /usr/share/nginx/html/editor/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Runtime bundle (end-user app) — built with base /app/
    location /app/ {
        alias /usr/share/nginx/html/runtime/;
        try_files $uri $uri/ /app/index.html;
    }
    location = /app/index.html {
        alias /usr/share/nginx/html/runtime/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy → backend (in dev, Vite proxy handles this instead)
    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
