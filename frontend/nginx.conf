server {
    listen 80;
    server_name _;

    # Bare root → App Builder
    location = / {
        return 302 /editor/;
    }

    # Editor bundle (App Builder) — built with base /editor/
    location /editor/ {
        alias /usr/share/nginx/html/editor/;
        try_files $uri $uri/ /editor/index.html;
    }

    # Runtime bundle (end-user app) — built with base /app/
    location /app/ {
        alias /usr/share/nginx/html/runtime/;
        try_files $uri $uri/ /app/index.html;
    }

    # API proxy → backend (in dev, Vite proxy handles this instead)
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
