version: "3.9"

x-backend-common: &backend-common
  build:
    context: ../backend
    dockerfile: Dockerfile
    target: runtime
  environment:
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
    JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    SECRET_KEY: ${SECRET_KEY}
    APP_ENV: ${APP_ENV:-development}
    DEBUG: ${DEBUG:-true}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    S3_ACCESS_KEY: ${S3_ACCESS_KEY}
    S3_SECRET_KEY: ${S3_SECRET_KEY}
    SMTP_HOST: ${SMTP_HOST}
    SMTP_PORT: ${SMTP_PORT}
    EMAIL_FROM: ${EMAIL_FROM}
    CORS_ORIGINS: ${CORS_ORIGINS}
    CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
    CLAMAV_PORT: ${CLAMAV_PORT:-3310}
  volumes:
    - ../backend:/app:cached
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ---- Backend API ----
  backend:
    <<: *backend-common
    container_name: nocode-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Celery worker (general tasks) ----
  worker:
    <<: *backend-common
    container_name: nocode-worker
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,notifications,exports
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---- Celery sandbox worker (rules/code execution — isolated) ----
  sandbox-worker:
    <<: *backend-common
    container_name: nocode-sandbox
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=sandbox
    # Network isolation for sandbox: no access to internal services
    # In production this would use a separate network with no_outbound=true
    environment:
      <<: *backend-common
      SANDBOX_MODE: "true"

  # ---- Celery beat (scheduled tasks) ----
  beat:
    <<: *backend-common
    container_name: nocode-beat
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    depends_on:
      worker:
        condition: service_started

  # ---- Frontend ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: dev
    container_name: nocode-frontend
    volumes:
      - ../frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: nocode-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nocode}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-nocode}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
        -c log_min_duration_statement=1000

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: nocode-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- MinIO (S3-compatible) ----
  minio:
    image: minio/minio:latest
    container_name: nocode-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MailHog (dev SMTP) ----
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nocode-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---- ClamAV (antivirus) ----
  clamav:
    image: clamav/clamav:1.4
    container_name: nocode-clamav
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: nocode-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:11.4.0
    container_name: nocode-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  prometheus_data:
  grafana_data:
