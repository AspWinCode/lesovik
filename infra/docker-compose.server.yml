# Lean production stack for single-VM deploy.
# Run from the infra/ directory:  docker compose -f docker-compose.server.yml up -d
# Reads ./.env for secrets and ${VAR} interpolation.
name: lesovik

services:
  postgres:
    image: postgres:16-alpine
    container_name: lesovik-postgres
    environment:
      POSTGRES_DB: nocode
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d nocode"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lesovik-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lesovik-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    container_name: lesovik-backend
    command: >
      gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        -w 4 --bind 0.0.0.0:8000 --timeout 120 --access-logfile -
    env_file: .env
    environment:
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"   # localhost-only, for debugging
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    container_name: lesovik-worker
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=info --concurrency=4
        --queues=default,notifications,exports
    env_file: .env
    environment:
      APP_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: lesovik-frontend
    depends_on:
      - backend
    ports:
      - "8090:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
