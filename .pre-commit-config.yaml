repos:
  # Universal
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allows custom YAML tags (e.g., !reference in GitLab CI)
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main]

  # Secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python — ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Python — mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && mypy app'
        language: system
        types: [python]
        pass_filenames: false
        files: ^backend/app/

  # Frontend — eslint + prettier
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        types_or: [ts, tsx]
        pass_filenames: false
        files: ^frontend/src/
      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && pnpm format --check'
        language: system
        types_or: [ts, tsx, css, json]
        pass_filenames: false
        files: ^frontend/src/
